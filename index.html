<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Code Assistant</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- External CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-900 text-white font-mono">

<!-- Header -->
<header class="bg-gray-800 p-4 text-center text-xl font-bold">
    💡 AI Code Assistant (OpenRouter AI)
</header>

<div class="flex h-[90vh]">

    <!-- Editor -->
    <div class="w-1/2 p-4 flex flex-col border-r border-gray-700">
        <h2 class="text-green-400 mb-2">Code Editor</h2>

        <textarea id="codeInput" class="editor"
        placeholder="Write your code here...">
function test() {
    consol.log("Hello World"
}
        </textarea>

        <button id="analyzeBtn"
        class="mt-3 bg-blue-600 hover:bg-blue-700 p-2 rounded">
            Analyze with AI
        </button>

        <button id="copyBtn"
        class="mt-2 bg-green-600 hover:bg-green-700 p-2 rounded">
            📋 Copy Fixed Code
        </button>
    </div>

    <!-- Output -->
    <div class="w-1/2 p-4 flex flex-col">
        <h2 class="text-yellow-400 mb-2">AI Analysis</h2>

        <div id="output" class="output">
            Waiting for analysis...
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
